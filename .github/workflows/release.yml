name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ferroload-linux-x86_64

          - name: Windows x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ferroload-windows-x86_64.exe

          - name: macOS Intel
            os: macos-13
            target: x86_64-apple-darwin
            artifact: ferroload-macos-x86_64

          - name: macOS Apple Silicon
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: ferroload-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/ferroload ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/ferroload.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Ferroload ${{ github.ref_name }}
          body: |
            ## Ferroload ${{ github.ref_name }}

            Single-binary BitTorrent client with web dashboard.

            ### Download

            | Platform | File |
            |---|---|
            | Linux x86_64 | `ferroload-linux-x86_64` |
            | Windows x86_64 | `ferroload-windows-x86_64.exe` |
            | macOS Intel | `ferroload-macos-x86_64` |
            | macOS Apple Silicon | `ferroload-macos-arm64` |

            ### Run

            ```bash
            # Linux / macOS
            chmod +x ferroload-linux-x86_64
            ./ferroload-linux-x86_64
            # then open http://localhost:7070
            ```

            Windows: double-click `ferroload-windows-x86_64.exe`
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
